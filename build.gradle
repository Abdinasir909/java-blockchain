plugins {
    id 'java'
    id 'application'
}

group = 'noobchain'
version = '1.0-SNAPSHOT'

sourceCompatibility = '11'
targetCompatibility = '11'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation 'org.bouncycastle:bcprov-jdk15on:1.70'
}

application {
    mainClass = 'noobchain.NoobChain'
}

jar {
    manifest {
        attributes 'Main-Class': 'noobchain.NoobChain'
    }
}
